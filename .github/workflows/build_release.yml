name: Release Builder
# Build a stable release on a tag v* newly pushed

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-build:
    runs-on: 'ubuntu-24.04'
    outputs:
      VERSION_TAG: ${{ steps.get_tag.outputs.VERSION_TAG }}
      CURRENT_SHA: ${{ steps.current_commit.outputs.CURRENT_SHA }}
      PREV_RELEASE_SHA: ${{ steps.previous_commit.outputs.PREV_RELEASE_SHA }}
      COMMIT_LOGS: ${{ steps.commit_logs.outputs.COMMIT_LOGS }}
      PREV_TAG_NAME: ${{ steps.previous_commit.outputs.PREV_TAG_NAME }}
    steps:
      - name: Get tag name (${{ github.ref }})
        id: get_tag
        run: |
          version_tag=$(echo ${GITHUB_REF/refs\/tags\//} | sed -r 's/^refs\/(heads|tags)\///' | sed -r 's/[-\/]+/_/g')
          echo "VERSION_TAG=$version_tag"
          echo "VERSION_TAG=$version_tag" >> $GITHUB_OUTPUT

      - name: Clone Repository (${{ steps.get_tag.outputs.VERSION_TAG }})
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get previous release
        id: last_release
        run: |
          # Find previous tag using git (works even with no prior releases)
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "PREV_TAG_NAME=$prev_tag"
          echo "PREV_TAG_NAME=$prev_tag" >> $GITHUB_OUTPUT

      - name: Current commit
        id: current_commit
        run: |
          commit_count=$(git rev-list --count HEAD)
          current_sha=$(git rev-parse --short HEAD)
          echo "COMMIT_COUNT=$commit_count"
          echo "COMMIT_COUNT=$commit_count" >> $GITHUB_OUTPUT
          echo "CURRENT_SHA=$current_sha"
          echo "CURRENT_SHA=$current_sha" >> $GITHUB_OUTPUT

      - name: Previous commit
        id: previous_commit
        run: |
          prev_tag="${{ steps.last_release.outputs.PREV_TAG_NAME }}"
          if [ -n "$prev_tag" ]; then
            commit_count_diff=$(git rev-list --count "$prev_tag"..HEAD)
            if [ "$commit_count_diff" -eq 0 ]; then
              commit_count_diff=1
            fi
            prev_release_sha=$(git rev-parse --short HEAD~$commit_count_diff)
          else
            # No previous tag — use root commit
            prev_release_sha=$(git rev-list --max-parents=0 HEAD | head -1 | cut -c1-7)
          fi
          echo "PREV_RELEASE_SHA=$prev_release_sha"
          echo "PREV_RELEASE_SHA=$prev_release_sha" >> $GITHUB_OUTPUT

      - name: Commit logs
        id: commit_logs
        run: |
          commit_logs=$(curl -sf -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/compare/${{ steps.previous_commit.outputs.PREV_RELEASE_SHA }}...${{ steps.current_commit.outputs.CURRENT_SHA }}" \
            | jq '[.commits[]|{message:(.commit.message | split("\n")), username:.author.login}]' \
            | jq -r '.[]|"- \(.message | first) (@\(.username))"' || echo "")
          {
          echo "COMMIT_LOGS<<{delimiter}"
          echo "$commit_logs"
          echo "{delimiter}"
          } >> $GITHUB_OUTPUT

  build-app:
    name: Build release app
    runs-on: 'ubuntu-24.04'
    needs: prepare-build
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
    steps:
      - name: Clone Repository (${{ needs.prepare-build.outputs.VERSION_TAG }})
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Write google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
        with:
          path: app/google-services.json
          contents: ${{ secrets.GOOGLE_SERVICES_JSON }}
          write-mode: overwrite
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Write client_secrets.json
        if: ${{ env.GOOGLE_CLIENT_SECRETS_JSON != '' }}
        uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
        with:
          path: app/src/main/assets/client_secrets.json
          contents: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
          write-mode: overwrite
        env:
          GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Build app
        run: ./gradlew assembleRelease

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: "**/*.apk"
          retention-days: 1

      - name: Upload mapping
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mapping-${{ github.sha }}
          path: app/build/outputs/mapping/release

  release-app:
    runs-on: 'ubuntu-24.04'
    needs:
      - prepare-build
      - build-app
    env:
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Sign APK
        if: ${{ env.SIGNING_KEY != '' }}
        uses: r0adkll/sign-android-release@f30bdd30588842ac76044ecdbd4b6d0e3e813478
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.1'
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Get SHA & clean up build artifacts
        id: get_sha
        run: |
          set -e
          TAG="${{ needs.prepare-build.outputs.VERSION_TAG }}"
          DIR="app/build/outputs/apk/release"

          # Use signed APKs if signing step ran, otherwise use unsigned
          if [ -f "$DIR/app-universal-release-unsigned-signed.apk" ]; then
            SUFFIX="-unsigned-signed"
          else
            SUFFIX="-unsigned"
          fi

          mv "$DIR/app-universal-release${SUFFIX}.apk" "kokomikku-${TAG}.apk"
          mv "$DIR/app-arm64-v8a-release${SUFFIX}.apk" "kokomikku-arm64-v8a-${TAG}.apk"
          mv "$DIR/app-armeabi-v7a-release${SUFFIX}.apk" "kokomikku-armeabi-v7a-${TAG}.apk"
          mv "$DIR/app-x86-release${SUFFIX}.apk" "kokomikku-x86-${TAG}.apk"
          mv "$DIR/app-x86_64-release${SUFFIX}.apk" "kokomikku-x86_64-${TAG}.apk"

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.prepare-build.outputs.VERSION_TAG }}
          name: kokomikku ${{ needs.prepare-build.outputs.VERSION_TAG }}
          body: |
            [![GitHub downloads](https://img.shields.io/github/downloads/${{ github.repository }}/${{ needs.prepare-build.outputs.VERSION_TAG }}/total?label=Downloaded&labelColor=27303D&color=0D1117&logo=github&logoColor=FFFFFF&style=flat)](https://github.com/${{ github.repository }}/releases/${{ needs.prepare-build.outputs.VERSION_TAG }})
            #### What's Changed
            ##### New

            ##### Improve

            ##### Fix

            ${{ needs.prepare-build.outputs.COMMIT_LOGS }}

            ##### Based on

            **Full Changelog**: [${{ github.repository }}@${{ needs.prepare-build.outputs.PREV_TAG_NAME }}...${{ needs.prepare-build.outputs.VERSION_TAG }}](https://github.com/${{ github.repository }}/compare/${{ needs.prepare-build.outputs.PREV_TAG_NAME }}...${{ needs.prepare-build.outputs.VERSION_TAG }})

            <!-->
            > [!TIP]
            >
            > ### If you are unsure which version to download then go with `kokomikku-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk`
          files: |
            kokomikku-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk
            kokomikku-arm64-v8a-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk
            kokomikku-armeabi-v7a-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk
            kokomikku-x86-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk
            kokomikku-x86_64-${{ needs.prepare-build.outputs.VERSION_TAG }}.apk
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
